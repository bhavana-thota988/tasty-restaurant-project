{% extends "base.html" %}

{% block content %}

<!-- Hero -->
<section class="h-[35vh] flex items-center justify-center text-center text-white bg-cover bg-center"
style="background-image:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');">

    <div class="bg-black/60 p-8 rounded-xl">
        <h1 class="text-5xl font-bold">Welcome Back</h1>
        <p class="mt-2">Login to your account</p>
    </div>

</section>

<!-- Login -->
<section class="py-20 bg-gray-100">

    <div class="max-w-md mx-auto bg-white p-10 rounded-2xl shadow-lg">

        <h2 class="text-3xl font-bold text-center mb-6">Login</h2>

        <form method="POST">

            <input type="email" name="email" placeholder="Email"
            class="w-full p-4 border rounded mb-4" required>

            <input type="password" name="password" placeholder="Password"
            class="w-full p-4 border rounded mb-4" required>

            <button type="submit"
            class="w-full bg-red-600 text-white py-3 rounded font-bold">
                Login
            </button>

        </form>

        <p class="text-center mt-4">
            No account? <a href="/register" class="text-red-600 font-bold">Register</a>
        </p>

    </div>

</section>

{% endblock %}
